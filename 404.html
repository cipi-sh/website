<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found | Cipi</title>
    <meta name="robots" content="noindex, nofollow">

    <link rel="icon" id="favicon" type="image/png" sizes="48x48" href="/favicon-light.png">
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-light-96.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-light-192.png">
    <link rel="apple-touch-icon" sizes="192x192" href="/favicon-light-192.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=JetBrains+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --font-body: 'DM Sans', sans-serif;
            --font-display: 'Fraunces', serif;
            --font-mono: 'JetBrains Mono', monospace;
            --radius: 12px;
            --radius-sm: 8px;
        }

        [data-theme="light"] {
            --bg: #FAFAF8;
            --bg-warm: #F5F3EF;
            --bg-card: #FFFFFF;
            --text: #1A1A1A;
            --text-secondary: #6B6B6B;
            --text-muted: #999999;
            --accent: #2C5F2D;
            --accent-light: #97BC62;
            --border: #E8E6E1;
            --border-light: #F0EDE8;
            --code-bg: #1E2028;
            --code-text: #E4E4E7;
            --code-accent: #97BC62;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.08);
            --nav-bg: rgba(250, 250, 248, 0.85);
            --tag-bg: rgba(44, 95, 45, 0.06);
        }

        [data-theme="dark"] {
            --bg: #111114;
            --bg-warm: #18181C;
            --bg-card: #1E1E23;
            --text: #E8E6E1;
            --text-secondary: #9A9A9A;
            --text-muted: #666666;
            --accent: #97BC62;
            --accent-light: #B8D888;
            --border: #2A2A30;
            --border-light: #1F1F24;
            --code-bg: #0C0C0F;
            --code-text: #E4E4E7;
            --code-accent: #97BC62;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.2);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.4);
            --nav-bg: rgba(17, 17, 20, 0.88);
            --tag-bg: rgba(151, 188, 98, 0.1);
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 16px;
        }

        body {
            font-family: var(--font-body);
            color: var(--text);
            background: var(--bg);
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            transition: background 0.3s, color 0.3s;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 1120px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* ── Navigation ── */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: var(--nav-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-light);
            transition: box-shadow 0.3s ease, background 0.3s;
        }

        nav .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--text);
        }

        .nav-logo svg.tux-logo {
            width: 28px;
            height: 28px;
            flex-shrink: 0;
            color: var(--text);
        }

        .nav-logo span {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 1.15rem;
            letter-spacing: -0.02em;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-nav {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--text);
            color: var(--bg);
            padding: 8px 20px;
            border-radius: 100px;
            font-weight: 500;
            font-size: 0.875rem;
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .btn-nav:hover {
            opacity: 0.85;
            color: var(--bg);
        }

        .theme-toggle {
            background: none;
            border: 1px solid var(--border);
            border-radius: 100px;
            width: 36px;
            height: 36px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .theme-toggle:hover {
            color: var(--text);
            border-color: var(--text-muted);
        }

        .theme-toggle svg {
            width: 16px;
            height: 16px;
        }

        .theme-toggle .icon-moon {
            display: block;
        }

        .theme-toggle .icon-sun {
            display: none;
        }

        [data-theme="dark"] .theme-toggle .icon-moon {
            display: none;
        }

        [data-theme="dark"] .theme-toggle .icon-sun {
            display: block;
        }

        /* ── 404 Content ── */
        .error-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 140px 0 100px;
            position: relative;
        }

        .error-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 600px;
            background: linear-gradient(180deg, var(--bg-warm) 0%, var(--bg) 100%);
            z-index: -1;
        }

        .error-content {
            text-align: center;
            max-width: 520px;
        }

        .error-code {
            font-family: var(--font-mono);
            font-size: 7rem;
            font-weight: 500;
            color: var(--accent);
            line-height: 1;
            margin-bottom: 16px;
            opacity: 0.8;
        }

        .error-title {
            font-family: var(--font-display);
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 12px;
        }

        .error-description {
            color: var(--text-secondary);
            font-size: 1.05rem;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .error-terminal {
            background: var(--code-bg);
            border-radius: var(--radius);
            padding: 24px 28px;
            text-align: left;
            margin-bottom: 40px;
            box-shadow: var(--shadow-lg);
        }

        .error-terminal-line {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            color: var(--code-text);
            line-height: 1.8;
        }

        .error-terminal-line .prompt {
            color: var(--code-accent);
        }

        .error-terminal-line .dim {
            color: #666;
        }

        .error-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--text);
            color: var(--bg);
            padding: 12px 28px;
            border-radius: 100px;
            font-family: var(--font-body);
            font-weight: 500;
            font-size: 0.9rem;
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .btn-primary:hover {
            opacity: 0.85;
            color: var(--bg);
        }

        .btn-secondary {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: transparent;
            color: var(--text);
            padding: 12px 28px;
            border-radius: 100px;
            border: 1px solid var(--border);
            font-family: var(--font-body);
            font-weight: 500;
            font-size: 0.9rem;
            text-decoration: none;
            transition: all 0.2s;
        }

        .btn-secondary:hover {
            border-color: var(--text-muted);
            color: var(--text);
        }

        /* ── Footer ── */
        footer {
            padding: 48px 0;
            border-top: 1px solid var(--border-light);
        }

        .footer-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .footer-left {
            font-size: 0.82rem;
            color: var(--text-muted);
        }

        .footer-left a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer-left a:hover {
            color: var(--text);
        }

        .footer-links {
            display: flex;
            gap: 24px;
            list-style: none;
        }

        .footer-links a {
            font-size: 0.82rem;
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer-links a:hover {
            color: var(--text);
        }

        /* ── Responsive ── */
        @media (max-width: 480px) {
            .error-code {
                font-size: 5rem;
            }

            .error-title {
                font-size: 1.4rem;
            }

            .error-terminal {
                padding: 18px 20px;
            }

            .error-terminal-line {
                font-size: 0.78rem;
            }

            .footer-content {
                flex-direction: column;
                gap: 16px;
                text-align: center;
            }
        }
    </style>
</head>

<body>

    <nav>
        <div class="container">
            <a href="/" class="nav-logo">
                <svg class="tux-logo" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" fill="none">
                    <path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                        d="M16.2182,35.9c-3.1368,0-6.8982,1.496-7.2988,5.6766a.916.916,0,0,0,.9061,1.0025h11.97A.9.9,0,0,0,22.7,41.643C22.6175,39.8048,21.7865,35.9,16.2182,35.9Z" />
                    <path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"

                    <path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                        d="M35.0148,36.4556c3.1848-2.8438,2.7468-7.5246,2.7468-8.7785,2.8935.82,5.0306,2.9709,5.5941,2.17,1.3744-1.9531-7.5193-7.5461-7.6918-10.8989C35.4951,15.6692,35.1706,5.4214,24,5.4214S12.5049,15.6692,12.3361,18.9484c-.1725,3.3528-9.0662,8.9458-7.6918,10.8989.5635.8007,2.7006-1.35,5.5941-2.17,0,1.2539-.438,5.9347,2.7468,8.7785" />

                    <path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                        d="M20.0521,20.564c-3.424.5063-3.9062-2.7247-3.9062-4.7019,0-2.7006,1.4467-4.4367,3.9062-4.4367S23.79,14.7529,23.79,16.3443A3.8486,3.8486,0,0,1,23.181,18.68" />
                    <path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"

                        d="M22.7012,41.4815a6.8371,6.8371,0,0,0,2.6076,0" />
                    <circle fill="currentColor" cx="22.1579" cy="16.5888" r="0.75" />
                    <circle fill="currentColor" cx="25.5497" cy="16.5888" r="0.75" />
                </svg>
                <span>Cipi</span>
            </a>
            <div class="nav-right">
                <a href="/" class="btn-nav">Home</a>
                <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
                    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z" />
                    </svg>
                    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"

                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                        <line x1="1" y1="12" x2="3" y2="12" />
                        <line x1="21" y1="12" x2="23" y2="12" />

                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
                    </svg>
                </button>
            </div>
        </div>
    </nav>

    <section class="error-section">
        <div class="container">
            <div class="error-content">
                <div class="error-code">404</div>
                <h1 class="error-title">Page not found</h1>
                <p class="error-description">
                    The page you're looking for doesn't exist or has been moved.
                </p>
                <div class="error-terminal">
                    <div class="error-terminal-line"><span class="prompt">$</span> curl -s cipi.sh/this-page</div>
                    <div class="error-terminal-line"><span class="dim">HTTP/1.1 404 Not Found</span></div>
                    <div class="error-terminal-line"><span class="dim"># Oops! Nothing deployed here.</span></div>
                </div>
                <div class="error-actions">
                    <a href="/" class="btn-primary">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                            <polyline points="9 22 9 12 15 12 15 22" />
                        </svg>
                        Back to Home
                    </a>
                    <a href="docs/" class="btn-secondary">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" />
                            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />
                        </svg>
                        Read Docs
                    </a>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-left">
                    Made with ❤️ by <a href="https://web.ap.it" target="_blank">Andrea Pollastri</a>
                </div>
                <ul class="footer-links">
                    <li><a href="https://conn.web.ap.it" target="_blank">Try SSH Connection Manager with Cipi</a></li>
                </ul>
            </div>
        </div>
    </footer>

    <script>
        function updateFavicon(theme) {
            const variant = theme === 'dark' ? 'dark' : 'light';
            document.getElementById('favicon').href = `/favicon-${variant}.png`;
        }

        function toggleTheme() {
            const html = document.documentElement;
            const next = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', next);
            localStorage.setItem('cipi-theme', next);
            updateFavicon(next);
        }

        (function () {
            const saved = localStorage.getItem('cipi-theme');
            if (saved) {
                document.documentElement.setAttribute('data-theme', saved);
                updateFavicon(saved);
            } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
                document.documentElement.setAttribute('data-theme', 'dark');
                updateFavicon('dark');
            }
        })();
    </script>

</body>

</html>
